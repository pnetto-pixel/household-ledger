<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Household Ledger" />
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Household Ledger</title>
    <style>
      /* Size every container to the FULL physical screen (100lvh = 874pt on
         this device; 100dvh/% = only the 812pt safe viewport, which left the
         34px home-indicator strip uncovered). All equal → no overflow to
         rubber-band and nothing clipped. The app's fixed shell scrolls only
         its inner <main>. */
      html, body, #root {
        margin: 0;
        height: 100lvh;
        overflow: hidden;
        overscroll-behavior: none;
        background: #0b0d10;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
