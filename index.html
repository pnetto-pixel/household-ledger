<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Household Ledger" />
    <meta name="google-client-id" content="%VITE_GOOGLE_CLIENT_ID%" />
    <meta name="admin-emails" content="%VITE_ADMIN_EMAILS%" />
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Household Ledger</title>
    <style>
      /* Lock the page so it can't scroll or rubber-band (the bounce was
         revealing a black overscroll area over the fixed tab bar). The app's
         own fixed shell handles all layout and internal scrolling. */
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        position: fixed;
        inset: 0;
        width: 100%;
        background: #0b0d10;
        overscroll-behavior: none;
      }
      #root { height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
